<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歷史大事配對 - King Sir G12知識長征</title>
    <style>
        :root { --primary: #3498db; --success: #2ecc71; --error: #e74c3c; --gold: #f1c40f; --dark: #2c3e50; --orange: #e67e22; --purple: #9b59b6; }
        body { font-family: 'Microsoft JhengHei', sans-serif; background-color: #f0f3f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #game-container { background: white; padding: 2rem; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); width: 95%; max-width: 850px; text-align: center; }
        
        /* King Sir Q版頭像 */
        .king-sir-avatar { width: 100px; height: 100px; background: #ffeaa7; border-radius: 50%; margin: 0 auto 15px; position: relative; border: 4px solid #fab1a0; }
        .crown { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); font-size: 45px; animation: float 2s infinite alternate; }
        .glasses { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); width: 60px; height: 20px; border-bottom: 3px solid #2d3436; }
        .smile { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); width: 30px; height: 15px; border-bottom: 3px solid #2d3436; border-radius: 50%; }
        @keyframes float { from { transform: translateX(-50%) translateY(0); } to { transform: translateX(-50%) translateY(-10px); } }

        .stats-bar { display: flex; justify-content: space-between; margin-bottom: 1rem; background: #f8f9fa; padding: 12px; border-radius: 15px; font-weight: bold; font-size: 0.95rem; border: 1px solid #eee; }
        .total-score-display { color: var(--orange); font-size: 1.1rem; border-left: 2px solid #ddd; padding-left: 10px; }
        .timer-box { font-size: 1.2rem; font-weight: bold; color: var(--orange); margin: 10px 0; background: #fff5e6; display: inline-block; padding: 5px 20px; border-radius: 20px; }
        
        /* 大事顯示區域 */
        #event-display { font-size: 2.2rem; font-weight: 900; color: var(--dark); margin: 1rem 0; min-height: 6rem; display: flex; align-items: center; justify-content: center; line-height: 1.3; padding: 0 20px; }
        
        .options-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        @media (max-width: 600px) { .options-grid { grid-template-columns: repeat(2, 1fr); } }
        
        button { padding: 15px 5px; font-size: 1.05rem; border: 2px solid #dfe6e9; border-radius: 15px; background: white; cursor: pointer; transition: 0.2s; font-weight: bold; }
        button:hover:not(:disabled) { border-color: var(--primary); background: #f0f7ff; transform: translateY(-2px); }
        button.correct { background: var(--success) !important; color: white; border-color: #27ae60; }
        button.wrong { background: var(--error) !important; color: white; border-color: #c0392b; }
        
        .hidden { display: none; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 18px; font-size: 1.2rem; border-radius: 50px; cursor: pointer; width: 100%; margin-top: 20px; font-weight: bold; transition: 0.3s; }
        .btn-main:hover { filter: brightness(1.1); transform: scale(1.02); }
        
        .stars-row { margin: 20px 0; display: flex; justify-content: center; gap: 10px; }
        .big-star { font-size: 3.5rem; color: var(--gold); animation: starPop 0.8s infinite alternate; text-shadow: 0 0 15px rgba(241, 196, 15, 0.5); }
        @keyframes starPop { from { transform: scale(0.9); } to { transform: scale(1.2); } }
        .score-box { background: #fff9e6; padding: 20px; border-radius: 20px; border: 2px dashed #f1c40f; margin: 20px 0; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="start-screen">
        <div class="king-sir-avatar"><div class="crown">👑</div><div class="glasses"></div><div class="smile"></div></div>
        <h1>歷史大事配對：25關馬拉松</h1>

        <div style="font-size: 0.95rem; color: #444; margin: 10px 0; text-align: left; display: inline-block; background: #eee; padding: 15px; border-radius: 10px;">
            🚀 45秒內完成：+20分<br>
            ⏱️ 55秒內完成：+10分<br>
            🐢 70秒內完成：+5分

        <button class="btn-main" onclick="startGame()">開始挑戰</button>

    <div id="game-screen" class="hidden">
        <div class="stats-bar">

        <div id="event-display">載入中...</div>
        <div class="options-grid" id="options-container"></div>
        <div id="feedback" style="margin-top:15px; font-weight:bold; height:1.5rem; font-size: 1.2rem;"></div>

    </div>

    <div id="result-screen" class="hidden">

        <div id="bonus-info" style="color: var(--orange); font-weight: bold; font-size: 1.2rem; margin: 10px 0;"></div>
        <p id="result-desc"></p>
        <button id="next-btn" class="btn-main" onclick="startLevel()" style="background:var(--success);">進入下一關</button>
        <button onclick="location.reload()" style="background:none; border:none; color:#999; margin-top:15px; cursor:pointer;">放棄挑戰</button>
    </div>

    <div id="win-screen" class="hidden">
        <div class="king-sir-avatar" style="width:120px; height:120px; border-color:var(--gold);">
            <div class="crown" style="font-size:55px; top:-40px;">👑</div>
            <div class="glasses" style="top:50px;"></div><div class="smile" style="bottom:20px; width:40px;"></div>
        </div>
        <h1 style="color: var(--orange);">🎉 歷史大師！完美通關</h1>
        <div class="stars-row">
            <span class="big-star">⭐</span><span class="big-star">⭐</span><span class="big-star">⭐</span><span class="big-star">⭐</span><span class="big-star">⭐</span>
        </div>
        <div class="score-box">

            <p>大事配對基礎分：<span id="final-base">0</span></p>

            <hr>

        </div>
        <button class="btn-main" onclick="location.reload()" style="background: var(--orange);">重新開始長征</button>
    </div>
</div>

let gamePool = [];
const dynasties = Object.keys(rawData);
for (let d in rawData) { rawData[d].forEach(name => gamePool.push({ name, dynasty: d })); }

let currentLevel = 0;
let currentCorrect = 0;
let currentIndex = 0;
let levelPool = [];
let totalAnsweredCount = 0;

let timerInterval;
let secondsElapsed = 0;
let totalBasePoints = 0;
let totalBonusPoints = 0;

function shuffle(array) { array.sort(() => Math.random() - 0.5); }

function startGame() {
    totalBasePoints = 0;
    totalBonusPoints = 0;
    totalAnsweredCount = 0;
    currentLevel = 0;
    shuffle(gamePool);
    document.getElementById('start-screen').classList.add('hidden');
    startLevel();
}

function startLevel() {
    currentLevel++;
    currentCorrect = 0;
    currentIndex = 0;
    secondsElapsed = 0;
    
    // 如果題庫不夠20題，重新洗牌
    if (totalAnsweredCount + 20 > gamePool.length) { shuffle(gamePool); totalAnsweredCount = 0; }
    levelPool = gamePool.slice(totalAnsweredCount, totalAnsweredCount + 20);
    
    document.getElementById('result-screen').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');
    
    clearInterval(timerInterval);
    document.getElementById('timer').innerText = 0;
    timerInterval = setInterval(() => {
        secondsElapsed++;
        document.getElementById('timer').innerText = secondsElapsed;
    }, 1000);

    updateDisplay();
}

function updateDisplay() {
    document.getElementById('lvl').innerText = currentLevel;
    document.getElementById('prog').innerText = currentIndex + 1;
    document.getElementById('current-correct').innerText = currentCorrect;
    document.getElementById('total-pts-live').innerText = totalBasePoints + totalBonusPoints;
    document.getElementById('event-display').innerText = levelPool[currentIndex].name;
    
    const container = document.getElementById('options-container');
    container.innerHTML = '';
    dynasties.forEach(d => {
        const btn = document.createElement('button');
        btn.innerText = d;
        btn.onclick = () => handleAnswer(d, btn);
        container.appendChild(btn);
    });
    document.getElementById('feedback').innerText = '';
}

function handleAnswer(choice, btn) {
    const correct = levelPool[currentIndex].dynasty;
    const btns = document.querySelectorAll('.options-grid button');
    btns.forEach(b => b.disabled = true);

    if (choice === correct) {
        currentCorrect++;
        totalBasePoints += 10;
        btn.classList.add('correct');
        document.getElementById('feedback').innerText = '正確！✨';
        document.getElementById('feedback').style.color = 'var(--success)';
    } else {
        btn.classList.add('wrong');
        document.getElementById('feedback').innerText = '答案：' + correct;
        document.getElementById('feedback').style.color = 'var(--error)';
        btns.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
    }

    document.getElementById('total-pts-live').innerText = totalBasePoints + totalBonusPoints;

    setTimeout(() => {
        currentIndex++;
        if (currentIndex < 20) {
            updateDisplay();
        } else {
            clearInterval(timerInterval);
            totalAnsweredCount += 20;
            showResults();
        }
    }, 800);
}

function showResults() {
    const passed = currentCorrect >= 15;
    let bonus = 0;
    
    if (passed) {
        if (secondsElapsed <= 45) bonus = 20;
        else if (secondsElapsed <= 55) bonus = 10;
        else if (secondsElapsed <= 70) bonus = 5;
        totalBonusPoints += bonus;
    } else {
        // 不及格時扣除該關基礎分，模擬失敗
        totalBasePoints -= (currentCorrect * 10);
    }

    document.getElementById('game-screen').classList.add('hidden');

    if (currentLevel === 25 && passed) {
        document.getElementById('win-screen').classList.remove('hidden');
        document.getElementById('final-base').innerText = totalBasePoints;
        document.getElementById('final-bonus').innerText = totalBonusPoints;
        document.getElementById('final-total').innerText = totalBasePoints + totalBonusPoints;
        return;
    }

    document.getElementById('result-screen').classList.remove('hidden');
    document.getElementById('result-title').innerText = passed ? `第 ${currentLevel} 關通過！` : '再接再厲！';
    
    if (passed) {
        document.getElementById('bonus-info').innerText = bonus > 0 ? `🚀 挑戰成功！速度獎勵：+${bonus} 分` : '⏳ 挑戰成功！無額外速度獎勵。';
        document.getElementById('result-desc').innerText = `本關答對 ${currentCorrect} 題，耗時 ${secondsElapsed} 秒。`;
        document.getElementById('next-btn').style.display = 'block';
        document.getElementById('next-btn').innerText = `進入第 ${currentLevel + 1} 關`;
    } else {
        document.getElementById('bonus-info').innerText = '';
        document.getElementById('result-desc').innerText = `本關僅答對 ${currentCorrect} 題，未達 15 題及格標準，挑戰結束。`;
        document.getElementById('next-btn').style.display = 'none';
    }
}
